<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <!-- PLACEHOLDER — sostituire con la foto vera del pomello-giocattolo Haiku.
       Vedi README.md. Pomello (faccia clown) in alto-centro: ancora ~ (50%, 40%).
       Haiku non ha splitter: nessun gate. -->
  <defs>
    <radialGradient id="dark" cx="50%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#2a2a2e"/>
      <stop offset="100%" stop-color="#0e0e10"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#dark)"/>
  <!-- base rossa giocattolo con scritta -->
  <rect x="150" y="560" width="300" height="120" rx="24" fill="#d81f2a"/>
  <text x="300" y="640" text-anchor="middle" fill="#d7ff2b"
        font-family="Impact, sans-serif" font-size="46" font-weight="900">HAIKU 4.5</text>
  <!-- asta -->
  <rect x="290" y="330" width="20" height="240" fill="#7a7f86"/>
  <!-- faccia da clown (pomello) -->
  <circle cx="300" cy="300" r="120" fill="#fff"/>
  <circle cx="300" cy="300" r="120" fill="none" stroke="#111" stroke-width="4"/>
  <!-- capelli colorati -->
  <g stroke-width="14" stroke-linecap="round">
    <line x1="185" y1="255" x2="140" y2="230" stroke="#2ec77a"/>
    <line x1="185" y1="300" x2="135" y2="300" stroke="#2bb3d8"/>
    <line x1="415" y1="255" x2="460" y2="230" stroke="#f39a2b"/>
    <line x1="415" y1="300" x2="465" y2="300" stroke="#d81f2a"/>
  </g>
  <!-- occhi a stella, naso, bocca -->
  <text x="255" y="290" text-anchor="middle" font-size="46" fill="#f5c518">★</text>
  <text x="345" y="290" text-anchor="middle" font-size="46" fill="#f5c518">★</text>
  <circle cx="300" cy="315" r="20" fill="#d81f2a"/>
  <path d="M245 335 Q300 400 355 335" fill="none" stroke="#d81f2a" stroke-width="12" stroke-linecap="round"/>
  <text x="300" y="770" text-anchor="middle" fill="#f3e7d4" opacity="0.5"
        font-family="sans-serif" font-size="20">placeholder — pomello giocattolo Haiku</text>
</svg>
